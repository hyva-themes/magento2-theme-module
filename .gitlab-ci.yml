workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - when: always

stages:
  - .pre
  - build
  - test

# Defaults
variables:
  SRC_DIR: './src'
  # Set to 'integration' or 'playwright' in the "Run Pipeline" UI to run only that job type
  RUN_ONLY: ''

include:
  - project: 'hyva-themes/base-ci'
    file: 'lint/php.yml'
    ref: magento-ci-images
  - project: 'hyva-themes/base-ci'
    file: 'static/phpcs.yml'
    ref: magento-ci-images
  - project: 'hyva-themes/base-ci'
    file: 'test/integration.yml'
    ref: magento-ci-images
  - project: 'hyva-themes/base-ci'
    file: 'test/playwright.yml'
    ref: magento-ci-images

# Override static jobs from includes to skip when RUN_ONLY is set
static:lint:
  rules:
    - if: $RUN_ONLY != ''
      when: never
    - when: on_success

static:phpcs:
  rules:
    - if: $RUN_ONLY != ''
      when: never
    - when: on_success

build:
  extends: .build:hyva
  rules:
    - if: $RUN_ONLY != ''
      when: never
    - when: on_success
  parallel:
    matrix:
      - CI_IMAGE_TAG: ['2.4.8-p4']
        HYVA_THEME_REF: ['main']

build:previous-releases:
  extends: .build:hyva
  rules:
    - if: $RUN_ONLY != ''
      when: never
    - when: manual
      allow_failure: true
  parallel:
    matrix:
      - CI_IMAGE_TAG: ['2.4.8-p4']
        HYVA_THEME_REF: ['1.3.x-main', '1.2.x-main', '1.1.x-main']

build:older-magento:
  extends: .build:hyva
  rules:
    - if: $RUN_ONLY != ''
      when: never
    - when: manual
      allow_failure: true
  parallel:
    matrix:
      - CI_IMAGE_TAG: ['2.4.4-p9']
        HYVA_THEME_REF: ['main']

test:integration:
  extends: .test:integration
  needs:
    - job: build
      parallel:
        matrix:
          - CI_IMAGE_TAG: ['2.4.8-p4']
            HYVA_THEME_REF: ['main']
    - job: static:lint
      optional: true
    - job: static:phpcs
      optional: true
  rules:
    - if: $RUN_ONLY != '' && $RUN_ONLY != "integration"
      when: never
    - when: on_success
  parallel:
    matrix:
      - CI_IMAGE_TAG: ['2.4.8-p4']
        HYVA_THEME_REF: ['main']

test:integration:previous-releases:
  extends: .test:integration
  needs:
    - job: build:previous-releases
      parallel:
        matrix:
          - CI_IMAGE_TAG: ['2.4.8-p4']
            HYVA_THEME_REF: ['1.3.x-main', '1.2.x-main', '1.1.x-main']
    - job: static:lint
      optional: true
    - job: static:phpcs
      optional: true
  rules:
    - if: $RUN_ONLY != '' && $RUN_ONLY != "integration"
      when: never
    - when: manual
      allow_failure: true
  parallel:
    matrix:
      - CI_IMAGE_TAG: ['2.4.8-p4']
        HYVA_THEME_REF: ['1.3.x-main', '1.2.x-main', '1.1.x-main']

test:integration:older-magento:
  extends: .test:integration
  variables:
    # Suppress E_DEPRECATED — Magento 2.4.4 core triggers deprecations on PHP 8.x
    PHP_TEST_ARGS: "-d error_reporting=E_ALL&~E_DEPRECATED"
  needs:
    - job: build:older-magento
      parallel:
        matrix:
          - CI_IMAGE_TAG: ['2.4.4-p9']
            HYVA_THEME_REF: ['main']
    - job: static:lint
      optional: true
    - job: static:phpcs
      optional: true
  rules:
    - if: $RUN_ONLY != '' && $RUN_ONLY != "integration"
      when: never
    - when: manual
      allow_failure: true
  parallel:
    matrix:
      - CI_IMAGE_TAG: ['2.4.4-p9']
        HYVA_THEME_REF: ['main']

test:playwright:
  extends: .test:playwright
  needs:
    - job: build
      parallel:
        matrix:
          - CI_IMAGE_TAG: ['2.4.8-p4']
            HYVA_THEME_REF: ['main']
    - job: static:lint
      optional: true
    - job: static:phpcs
      optional: true
  rules:
    - if: $RUN_ONLY != '' && $RUN_ONLY != "playwright"
      when: never
    - when: on_success
  parallel:
    matrix:
      - CI_IMAGE_TAG: ['2.4.8-p4']
        HYVA_THEME_REF: 'main'
        HYVA_PLAYWRIGHT_REF: 'main'

test:playwright:previous-releases:
  extends: .test:playwright
  needs:
    - job: build:previous-releases
      parallel:
        matrix:
          - CI_IMAGE_TAG: ['2.4.8-p4']
            HYVA_THEME_REF: ['1.3.x-main', '1.2.x-main', '1.1.x-main']
    - job: static:lint
      optional: true
    - job: static:phpcs
      optional: true
  rules:
    - if: $RUN_ONLY != '' && $RUN_ONLY != "playwright"
      when: never
    - when: manual
      allow_failure: true
  parallel:
    matrix:
      - CI_IMAGE_TAG: ['2.4.8-p4']
        HYVA_THEME_REF: '1.3.x-main'
        HYVA_PLAYWRIGHT_REF: 'hyva-1.3.x'
      - CI_IMAGE_TAG: ['2.4.8-p4']
        HYVA_THEME_REF: '1.2.x-main'
        HYVA_PLAYWRIGHT_REF: 'hyva-1.2.x'
      - CI_IMAGE_TAG: ['2.4.8-p4']
        HYVA_THEME_REF: '1.1.x-main'
        HYVA_PLAYWRIGHT_REF: 'hyva-1.1.x'

test:playwright:older-magento:
  extends: .test:playwright
  needs:
    - job: build:older-magento
      parallel:
        matrix:
          - CI_IMAGE_TAG: ['2.4.4-p9']
            HYVA_THEME_REF: ['main']
    - job: static:lint
      optional: true
    - job: static:phpcs
      optional: true
  rules:
    - if: $RUN_ONLY != '' && $RUN_ONLY != "playwright"
      when: never
    - when: manual
      allow_failure: true
  parallel:
    matrix:
      - CI_IMAGE_TAG: ['2.4.4-p9']
        HYVA_THEME_REF: 'main'
        HYVA_PLAYWRIGHT_REF: 'main'
