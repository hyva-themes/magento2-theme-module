workflow:
  rules:
    - if: $CI_PIPELINE_SOURCE == "merge_request_event"
      when: never
    - when: always

# Defaults
variables:
  SRC_DIR: './src'
  # Set to 'integration' or 'playwright' in the "Run Pipeline" UI to run only that job type
  RUN_ONLY: ''

include:
  - project: 'hyva-themes/base-ci'
    file: 'lint/php.yml'
    ref: main
  - project: 'hyva-themes/base-ci'
    file: 'static/phpcs.yml'
    ref: main
  - project: 'hyva-themes/base-ci'
    file: 'test/integration-box.yml'
    ref: main
  - project: 'hyva-themes/base-ci'
    file: 'test/theme-playwright-box.yml'
    ref: main

# Override static jobs from includes to skip when RUN_ONLY is set
static:lint:
  rules:
    - if: $RUN_ONLY != ''
      when: never
    - when: on_success

static:phpcs:
  rules:
    - if: $RUN_ONLY != ''
      when: never
    - when: on_success

test:integration:
  extends: .test:integration_box
  needs:
    - job: static:lint
      optional: true
    - job: static:phpcs
      optional: true
  rules:
    - if: $RUN_ONLY != '' && $RUN_ONLY != "integration"
      when: never
    - when: on_success
  parallel:
    matrix:
      - BOX_IMAGE_TAG: ['php84-fpm-magento2.4.8-p4']
        HYVA_THEME_REF: ['main']

test:integration:previous-releases:
  extends: .test:integration_box
  needs:
    - job: static:lint
      optional: true
    - job: static:phpcs
      optional: true
  rules:
    - if: $RUN_ONLY != '' && $RUN_ONLY != "integration"
      when: never
    - when: manual
      allow_failure: true
  parallel:
    matrix:
      - BOX_IMAGE_TAG: ['php84-fpm-magento2.4.8-p4']
        HYVA_THEME_REF: ['1.3.x-main', '1.2.x-main', '1.1.x-main']

test:playwright:
  extends: .test:theme_playwright_box
  needs:
    - job: static:lint
      optional: true
    - job: static:phpcs
      optional: true
  rules:
    - if: $RUN_ONLY != '' && $RUN_ONLY != "playwright"
      when: never
    - when: on_success
  parallel:
    matrix:
      - BOX_IMAGE_TAG: ['php84-fpm-magento2.4.8-p4-sample-data']
        HYVA_THEME_REF: 'main'
        HYVA_PLAYWRIGHT_REF: 'main'

test:playwright:previous-releases:
  extends: .test:theme_playwright_box
  needs:
    - job: static:lint
      optional: true
    - job: static:phpcs
      optional: true
  rules:
    - if: $RUN_ONLY != '' && $RUN_ONLY != "playwright"
      when: never
    - when: manual
      allow_failure: true
  parallel:
    matrix:
      - BOX_IMAGE_TAG: ['php84-fpm-magento2.4.8-p4-sample-data']
        HYVA_THEME_REF: '1.3.x-main'
        HYVA_PLAYWRIGHT_REF: 'hyva-1.3.x'
      - BOX_IMAGE_TAG: ['php84-fpm-magento2.4.8-p4-sample-data']
        HYVA_THEME_REF: '1.2.x-main'
        HYVA_PLAYWRIGHT_REF: 'hyva-1.2.x'
      - BOX_IMAGE_TAG: ['php84-fpm-magento2.4.8-p4-sample-data']
        HYVA_THEME_REF: '1.1.x-main'
        HYVA_PLAYWRIGHT_REF: 'hyva-1.1.x'
